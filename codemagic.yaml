workflows:
  salaryinfo-ios-final:
    name: SalaryInfo iOS - Final v1.0.4
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.ila.salaryinfo"
        APP_STORE_APPLE_ID: 6755962367
      xcode: latest
      cocoapods: default
      flutter: stable
    scripts:
      - name: Set up code signing
        script: |
          set -e
          set -x
          keychain initialize
      
      - name: Fix Bundle ID
        script: |
          set -e
          set -x
          cd ios
          sed -i '' 's/com.example.salaryinfo/com.ila.salaryinfo/g' Runner.xcodeproj/project.pbxproj
          cd ..
      
      - name: Verify Info.plist has HTTP permissions
        script: |
          set -e
          set -x
          echo "✓ Checking Info.plist for HTTP permissions..."
          if grep -q "NSAllowsArbitraryLoads" ios/Runner/Info.plist; then
            echo "✓ HTTP permissions found in Info.plist"
          else
            echo "✗ ERROR: HTTP permissions NOT found!"
            echo "Info.plist must include NSAppTransportSecurity settings"
            exit 1
          fi
      
      - name: Verify logo exists
        script: |
          set -e
          set -x
          echo "✓ Checking if logo file exists..."
          if [ -f "assets/images/logo.png" ]; then
            echo "✓ Logo file found: assets/images/logo.png"
          else
            echo "✗ WARNING: Logo file not found at assets/images/logo.png"
            echo "App will fail if logo is missing!"
          fi
      
      - name: Fetch signing files
        script: |
          set -e
          set -x
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      
      - name: Add certificates to keychain
        script: |
          set -e
          set -x
          keychain add-certificates
      
      - name: Set up code signing settings
        script: |
          set -e
          set -x
          xcode-project use-profiles
      
      - name: Get Flutter packages
        script: |
          set -e
          set -x
          flutter pub get
      
      - name: Install pods
        script: |
          set -e
          set -x
          cd ios
          pod install
          cd ..
      
      - name: Build IPA
        script: |
          set -e
          set -x
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    
    publishing:
      email:
        recipients:
          - hazajadded@gmail.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        auth: integration
        submit_to_testflight: true