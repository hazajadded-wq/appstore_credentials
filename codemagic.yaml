workflows:
  salaryinfo-ios-final:
    name: SalaryInfo iOS - v1.0.10 (2) iPhone Only
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: "com.pocket.salaryinfo"
        APP_STORE_APPLE_ID: 6756042000
      xcode: latest
      cocoapods: default
      flutter: stable
    scripts:
      - name: Set up code signing
        script: |
          set -e
          keychain initialize
      
      - name: Fetch signing files
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
      
      - name: Add certificates
        script: |
          set -e
          keychain add-certificates
      
      - name: Set up signing
        script: |
          set -e
          xcode-project use-profiles
      
      - name: Clean build
        script: |
          set -e
          echo "🧹 Cleaning Flutter build..."
          flutter clean
          echo "✅ Clean completed"
      
      - name: Get packages
        script: |
          set -e
          echo "📦 Getting Flutter packages..."
          flutter pub get
          echo "✅ Packages ready"
      
      - name: Install pods
        script: |
          set -e
          echo "📦 Installing CocoaPods..."
          cd ios && pod install && cd ..
          echo "✅ Pods installed"
      
      - name: Build IPA
        script: |
          set -e
          echo "📱 Building version 1.0.10 (2) - iPhone Only"
          echo "🔧 Fixed: UIRequiresFullScreen added to disable iPad multitasking"
          flutter build ipa --release \
            --build-name=1.0.10 \
            --build-number=2 \
            --export-options-plist=/Users/builder/export_options.plist
          echo "✅ Build completed successfully"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    
    publishing:
      email:
        recipients:
          - hazajadded@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
