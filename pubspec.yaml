name: salaryinfo
description: Government salary information portal
publish_to: 'none'

version: 1.0.10+8  # Incremented from +1 to +2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  webview_flutter: ^4.4.4
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.0.0
  permission_handler: ^12.0.1
  gal: ^2.3.2
  screenshot: ^3.0.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo.png
